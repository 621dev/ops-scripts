# =============================================================================
# conf/thresholds.conf
# 점검 임계값 및 튜닝 설정
#
# WARN  : 경고 — 모니터링 강화 권장
# FAIL  : 장애 — 즉시 조치 필요
# =============================================================================

# ── 공통: 시스템 리소스 ──────────────────────────────────────────────────────
SYS_CPU_WARN=70;        SYS_CPU_FAIL=90         # CPU Load (%)
SYS_MEM_WARN=75;        SYS_MEM_FAIL=90         # 메모리 사용률 (%)
SYS_DISK_WARN=70;       SYS_DISK_FAIL=85        # 디스크 사용률 (%)

# ── Nginx ─────────────────────────────────────────────────────────────────────
NGINX_CONN_WARN=1000;       NGINX_CONN_FAIL=3000        # 활성 연결 수
NGINX_5XX_WARN=5;           NGINX_5XX_FAIL=10           # 5xx 에러율 (%)
NGINX_ERROR_LOG_WARN=50;    NGINX_ERROR_LOG_FAIL=200    # 에러 로그 건수 (5분)
NGINX_SSL_WARN_DAYS=30;     NGINX_SSL_FAIL_DAYS=7       # SSL 만료 (일)
NGINX_UPSTREAM_HEALTH_CODE=200                          # 헬스체크 기대 응답코드

# ── Spring Boot ───────────────────────────────────────────────────────────────
SPRING_HEAP_WARN=75;        SPRING_HEAP_FAIL=90         # JVM Heap 사용률 (%)
SPRING_THREAD_WARN=300;     SPRING_THREAD_FAIL=500      # 라이브 스레드 수
SPRING_POOL_WARN=80;        SPRING_POOL_FAIL=95         # HikariCP 사용률 (%)
SPRING_RESP_WARN=2000;      SPRING_RESP_FAIL=5000       # 평균 응답시간 (ms)
SPRING_ERROR_LOG_WARN=20;   SPRING_ERROR_LOG_FAIL=100   # ERROR 로그 건수 (5분)
SPRING_FD_WARN=70;          SPRING_FD_FAIL=85           # 파일 디스크립터 (%)
SPRING_FULL_GC_WARN=5                                   # Full GC 횟수

# ── Redis ─────────────────────────────────────────────────────────────────────
REDIS_MEM_WARN=75;          REDIS_MEM_FAIL=90           # 메모리 사용률 (%)
REDIS_CONN_WARN=5000;       REDIS_CONN_FAIL=10000       # 연결 수
REDIS_BLOCKED_WARN=5                                    # Blocked 클라이언트 수
REDIS_SLOWLOG_WARN=10                                   # SlowLog 건수
REDIS_HIT_RATE_WARN=80                                  # Keyspace Hit Rate (%)
REDIS_RDB_AGE_WARN=3600                                 # RDB 백업 경과 시간 (초)

# Redis 메시지 큐 키 목록 (List 또는 Stream 타입)
QUEUE_KEYS=(
  "queue:messages"
  "queue:notifications"
  "queue:events"
)
QUEUE_LEN_WARN=10000;       QUEUE_LEN_FAIL=50000        # 큐 적체 건수

# ── MySQL ─────────────────────────────────────────────────────────────────────
MYSQL_REPL_LAG_WARN=30;     MYSQL_REPL_LAG_FAIL=120     # 복제 지연 (초)
MYSQL_CONN_WARN=80;         MYSQL_CONN_FAIL=95           # 연결 사용률 (%)
MYSQL_THREAD_WARN=100;      MYSQL_THREAD_FAIL=300        # Threads_running
MYSQL_SLOW_QUERY_WARN=50                                 # 슬로우 쿼리 누적
MYSQL_DEADLOCK_WARN=1                                    # 데드락 건수
MYSQL_BUF_HIT_WARN=95;      MYSQL_BUF_HIT_FAIL=90       # Buffer Pool Hit Rate (%)
MYSQL_SLOW_LOG_SIZE_WARN=1024                            # 슬로우 로그 파일 크기 (MB)

# ── 야간 점검 (overnight) ─────────────────────────────────────────────────────
OVERNIGHT_START="18:00"                                  # 야간 시작 시각
OVERNIGHT_END="08:30"                                    # 야간 종료 시각
OVERNIGHT_NGINX_5XX_WARN=2;  OVERNIGHT_NGINX_5XX_FAIL=5 # 야간 5xx 에러율 (%)
OVERNIGHT_APP_ERROR_WARN=5;  OVERNIGHT_APP_ERROR_FAIL=50 # 야간 ERROR 로그 건수
OVERNIGHT_SLOW_QUERY_WARN=50; OVERNIGHT_SLOW_QUERY_FAIL=200  # 야간 슬로우 쿼리
