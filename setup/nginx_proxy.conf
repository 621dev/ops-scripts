# =============================================================================
# setup/nginx_proxy.conf
# Nginx 리버스 프록시 설정 — Spring Boot Actuator 경유
#
# 배포 위치: 운영망 Nginx 서버의 /etc/nginx/conf.d/ops_proxy.conf
# 목적: 모니터링 서버(네트워크 분리) → Nginx(443) → Spring Boot(8080)/actuator/
#
# 적용 방법:
#   1. 이 파일을 Nginx 서버의 /etc/nginx/conf.d/ops_proxy.conf 로 복사
#   2. MONITOR_SERVER_IP 를 실제 모니터링 서버 IP 로 교체
#   3. nginx -t && nginx -s reload
# =============================================================================

# ── 모니터링 서버 IP 허용 목록 ─────────────────────────────────────────────
geo $is_monitor_server {
    default         0;
    10.0.0.100/32   1;   # ← 실제 모니터링 서버 IP 로 변경
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── Spring Boot Actuator 프록시 ──────────────────────────────────────
    # 경로: /ops/actuator/{서버별칭}/{actuator경로}
    # inventory.sh 의 SPRING_ACTUATOR_URLS 와 반드시 일치해야 함

    location /ops/actuator/spring-01/ {
        if ($is_monitor_server = 0) { return 403; }
        proxy_pass         http://192.168.10.20:8080/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        add_header Cache-Control "no-store, no-cache";
    }

    location /ops/actuator/spring-02/ {
        if ($is_monitor_server = 0) { return 403; }
        proxy_pass         http://192.168.10.21:8080/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        add_header Cache-Control "no-store, no-cache";
    }

    # ── stub_status ───────────────────────────────────────────────────────
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.100;   # ← 실제 모니터링 서버 IP 로 변경
        deny  all;
    }

    # ── 업스트림 헬스체크 ─────────────────────────────────────────────────
    location /health {
        proxy_pass        http://192.168.10.20:8080/actuator/health;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
    }
}
